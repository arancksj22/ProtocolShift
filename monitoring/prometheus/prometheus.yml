global:
  scrape_interval:     5s
  evaluation_interval: 5s
  scrape_timeout:      4s
  external_labels:
    project: "protocolshift"

scrape_configs:

  # ── REST suite — FastAPI /metrics endpoints ──────────────────
  - job_name: "rest-postgres"
    static_configs:
      - targets: ["rest-postgres:8001"]
        labels:
          suite:   "rest"
          backend: "postgres"

  - job_name: "rest-mongo"
    static_configs:
      - targets: ["rest-mongo:8002"]
        labels:
          suite:   "rest"
          backend: "mongo"

  - job_name: "rest-redis"
    static_configs:
      - targets: ["rest-redis:8003"]
        labels:
          suite:   "rest"
          backend: "redis"

  # ── gRPC suite — Prometheus sidecar HTTP servers ─────────────
  - job_name: "grpc-postgres"
    static_configs:
      - targets: ["grpc-postgres:50061"]
        labels:
          suite:   "grpc"
          backend: "postgres"

  - job_name: "grpc-mongo"
    static_configs:
      - targets: ["grpc-mongo:50062"]
        labels:
          suite:   "grpc"
          backend: "mongo"

  - job_name: "grpc-redis"
    static_configs:
      - targets: ["grpc-redis:50063"]
        labels:
          suite:   "grpc"
          backend: "redis"

  # ── Prometheus self-monitoring ───────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
